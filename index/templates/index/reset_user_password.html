{% extends 'index/layout.html' %}

{% block body %}
<div class="container-fluid m-0 p-0">
    {% include 'index/components/panel.html' %}

    <div class="create-form bg-light border-bottom" style="height: calc(100vh - 100px)">
        <div class="container py-4">
            <div class="card border-0 shadow-sm rounded-4 p-4" style="max-width: 700px;">
                <h5 class="mb-3">Resetear contraseña: {{ user_to_edit.username }}</h5>

                {% if message %}
                <div class="alert alert-{{message_type|default:'danger'}}" role="alert">
                    {{message}}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" name="confirmation" class="form-control" required>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning">Resetear contraseña</button>
                        <a href="{% url 'create_user' %}" class="btn btn-secondary">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

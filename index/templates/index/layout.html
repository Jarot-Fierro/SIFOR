{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SFOR{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'index/HurlUI.css' %}">
    <link rel="stylesheet" href="{% static 'index/style.css' %}">
    {% block script %}
    {% endblock %}
    <script>
        window.APP_URL_PREFIX = "{{ request.META.SCRIPT_NAME|default:'' }}".replace(/\/$/, "");
        window.SESSION_TIMEOUT = {{ request.session.get_expiry_age|default:3600 }};
        window.IS_AUTHENTICATED = {{ request.user.is_authenticated|yesno:"true,false" }};
    </script>
</head>
<body>
{% block body %}
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{% static 'index/session_timeout.js' %}"></script>


<script>
    $(document).ready(function () {
        const $rut = $('.id_rut, #id_rut');

        // Permitir escribir cualquier formato
        $rut.on('input', function () {
            this.value = this.value.replace(/[^0-9kK]/g, '');
        });

        // Función para formatear
        function formatRut(input) {
            let rut = input.value.replace(/\./g, '').replace(/-/g, '').toUpperCase();
            if (rut.length <= 1) return;

            let body = rut.slice(0, -1);
            let dv = rut.slice(-1);
            body = body.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            input.value = body + '-' + dv;
        }

        // Formatear al perder foco
        $rut.on('blur', function () {
            formatRut(this);
        });

        // 🔥 Formatear al cargar la página si el input ya trae un valor
        $rut.each(function () {
            if (this.value.trim() !== "") {
                formatRut(this);
            }
        });
    });
</script>
</body>
</html>

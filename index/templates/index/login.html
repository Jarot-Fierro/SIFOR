{% extends 'index/layout.html' %}

{% block body %}

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="card shadow-lg border-0 rounded-4 w-100" style="max-width: 420px;">

            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <h3 class="fw-bold">Inicio de Sesión</h3>
                    <p class="text-muted small">Accede con tu RUT y contraseña</p>
                </div>

                {% if message %}
                    <div class="alert alert-danger py-2 text-center small">
                        {{ message }}
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">RUT</label>
                        <input type="text"
                               name="username"
                               class="form-control form-control-lg rounded-3 id_rut"
                               placeholder="Ej: 12.345.678-9"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password"
                               name="password"
                               class="form-control form-control-lg rounded-3"
                               placeholder="Ingresa tu contraseña"
                               required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark btn-lg rounded-3">
                            Iniciar sesión
                        </button>
                    </div>

                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">
                        ¿Problemas para ingresar? Contacta al administrador
                    </small>
                </div>

            </div>
        </div>
    </div>

{% endblock %}

{% extends 'index/layout.html' %}

{% block body %}
<div class="container-fluid m-0 p-0">
    {% include 'index/components/panel.html' %}

    <div class="create-form bg-light border-bottom" style="height: calc(100vh - 100px)">
        <div class="container py-4">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h5 class="mb-3">Actualizar usuario: {{ user_to_edit.username }}</h5>

                {% if message %}
                <div class="alert alert-{{message_type|default:'danger'}}" role="alert">
                    {{message}}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">RUT</label>
                            <input type="text" name="username" class="form-control id_rut" value="{{user_to_edit.username}}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="first_name" class="form-control" value="{{user_to_edit.first_name}}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Apellido</label>
                            <input type="text" name="last_name" class="form-control" value="{{user_to_edit.last_name}}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Correo</label>
                            <input type="email" name="email" class="form-control" value="{{user_to_edit.email}}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Establecimiento</label>
                            <select name="establecimiento" class="form-select" required>
                                <option value="">Seleccione...</option>
                                {% for est in establecimientos %}
                                <option value="{{est.id}}" {% if user_to_edit.establecimiento_id == est.id %}selected{% endif %}>{{est}}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-1">
                            <div class="form-check form-switch mt-4">
                                <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if user_to_edit.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="is_active">Activo</label>
                            </div>
                        </div>
                        <div class="col-md-1">
                            <div class="form-check form-switch mt-4">
                                <input class="form-check-input" type="checkbox" name="is_staff" id="is_staff" {% if user_to_edit.is_staff %}checked{% endif %}>
                                <label class="form-check-label" for="is_staff">Staff</label>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                        <a href="{% url 'create_user' %}" class="btn btn-secondary">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

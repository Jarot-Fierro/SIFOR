{% extends 'index/layout.html' %}

{% block body %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0 rounded-4 w-100" style="max-width: 560px;">
        <div class="card-body p-4 text-center">
            <h3 class="fw-bold mb-3">Ya respondiste este formulario</h3>
            <p class="text-muted mb-4">Tu respuesta para el formulario <strong>{{ form.title }}</strong> ya fue registrada y solo se permite responder una vez.</p>

                Ir a Google
            </a>
        </div>
    </div>
</div>
{% endblock %}
